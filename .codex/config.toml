# Codex project-level config. Mirrors the root .mcp.json (Claude Code) so the
# measure-gui MCP server is available in Codex too. stdio is inferred from the
# presence of `command` — no transport/type field is needed. `uv run` is invoked
# from the project root (the trusted-project cwd), matching .mcp.json which sets
# no cwd; keep this in sync with .mcp.json when the launch command changes.
[mcp_servers.measure-gui]
command = "uv"
args = ["run", "--extra", "gui", "python", "lib/zcu_tools/gui/app/main/services/remote/mcp_server.py"]
env_vars = [
  "QT_QPA_PLATFORM",
  "DISPLAY",
  "WAYLAND_DISPLAY",
  "XDG_RUNTIME_DIR",
  "DBUS_SESSION_BUS_ADDRESS",
  "XDG_SESSION_TYPE",
]
# Auto-approve every measure-gui tool call (no per-call confirmation), the Codex
# analogue of the "mcp__measure-gui" allow rule in .claude/settings.local.json.
default_tools_approval_mode = "auto"

[mcp_servers.measure-gui.tools.gui_launch]
approval_mode = "approve"

[mcp_servers.measure-gui.tools.gui_adapter_list]
approval_mode = "approve"

